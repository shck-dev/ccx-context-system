# On every published release: notify the shck.dev blog repo (repository_dispatch).
# The blog then (a) rebuilds /changelog from this repo's releases.atom and (b) opens a
# draft announcement-post PR. Requires secret BLOG_DISPATCH_TOKEN — a fine-grained PAT
# scoped to ofcRS/shck.dev with Contents: read+write.
name: announce-release

on:
  release:
    types: [published]

jobs:
  notify-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch tool-release to ofcRS/shck.dev
        env:
          GH_TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL: ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
        run: |
          jq -n \
            --arg tool "ccx" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg url "$URL" \
            --arg body "$BODY" \
            '{event_type: "tool-release",
              client_payload: {tool: $tool, repo: $repo, tag: $tag, name: $name, url: $url, body: $body}}' \
          | gh api repos/ofcRS/shck.dev/dispatches --input -
